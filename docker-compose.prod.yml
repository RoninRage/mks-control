services:
  couchdb:
    image: couchdb:3.3
    container_name: mks-control-couchdb
    ports:
      - '5984:5984'
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-password}
    volumes:
      - couchdb_data:/opt/couchdb/data
      - couchdb_config:/opt/couchdb/etc/local.d
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5984/_up']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mks-network
    restart: unless-stopped

  backend:
    image: ghcr.io/${GITHUB_OWNER}/mks-control-backend:${TAG:-latest}
    container_name: mks-control-backend
    ports:
      - '3000:3000'
    environment:
      COUCHDB_URL: http://couchdb:5984
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-password}
      COUCHDB_DB_NAME: ${COUCHDB_DB_NAME:-mks_members}
      ADMIN_TAG_UIDS: ${ADMIN_TAG_UIDS:-}
      PORT: '3000'
      SEED_DATA: ${SEED_DATA:-false}
    depends_on:
      couchdb:
        condition: service_healthy
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
    networks:
      - mks-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GITHUB_OWNER}/mks-control-frontend:${TAG:-latest}
    container_name: mks-control-frontend
    ports:
      - '80:80'
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
    networks:
      - mks-network
    restart: unless-stopped

  nfc-bridge:
    image: ghcr.io/${GITHUB_OWNER}/mks-control-nfc-bridge:${TAG:-latest}
    container_name: mks-control-nfc-bridge
    environment:
      GATEWAY_URL: http://backend:3000
      POST_PATH: /api/auth/tag
      DEVICE_ID: ${NFC_DEVICE_ID:-prod-reader-01}
      SOURCE: acr122u
      DEBOUNCE_MS: ${NFC_DEBOUNCE_MS:-2000}
    privileged: true
    volumes:
      - /run/pcscd:/run/pcscd
    depends_on:
      - backend
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
    networks:
      - mks-network
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    container_name: mks-control-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker:/config:ro
      - /opt/mks/docker-compose.prod.yml:/docker-compose.yml:ro
      - /opt/mks/.env:/.env:ro
    environment:
      WATCHTOWER_LABEL_ENABLE: 'true'
      WATCHTOWER_CLEANUP: 'true'
      WATCHTOWER_POLL_INTERVAL: '300'
      DOCKER_CONFIG: /config
      DOCKER_API_VERSION: '1.45'
    networks:
      - mks-network
    restart: unless-stopped

volumes:
  couchdb_data:
  couchdb_config:

networks:
  mks-network:
    name: mks-control-network
