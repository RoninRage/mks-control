name: E2E Tests

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      couchdb:
        image: couchdb:3.3
        env:
          COUCHDB_USER: admin
          COUCHDB_PASSWORD: password
        ports:
          - 5984:5984
        options: >-
          --health-cmd "curl -sf http://localhost:5984/_up"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # pcsclite native dependency needs system headers
      - name: Install system dependencies
        run: sudo apt-get install -y libpcsclite-dev

      - name: Install dependencies
        run: npm ci --workspaces

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Generate .env.test (normally run via pretest:e2e)
      - name: Setup test environment
        run: node scripts/setup-test-env.js

      # Start backend in background
      - name: Start backend
        run: npm run dev &
        working-directory: apps/backend
        env:
          MONOREPO_DEV: 'true'
          NODE_ENV: test
          PORT: 3000
          COUCHDB_URL: http://localhost:5984
          COUCHDB_USER: admin
          COUCHDB_PASSWORD: password

      # Wait for backend health endpoint
      - name: Wait for backend
        run: |
          echo "Waiting for backend on port 3000..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend is up!"
              exit 0
            fi
            echo "  attempt $i/24..."
            sleep 5
          done
          echo "Backend did not start in time"
          exit 1

      # Start frontend in background
      - name: Start frontend
        run: npm run dev &
        working-directory: apps/frontend
        env:
          NODE_ENV: test

      # Wait for frontend (Quasar dev server)
      - name: Wait for frontend
        run: |
          echo "Waiting for frontend on port 9000..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:9000 > /dev/null 2>&1; then
              echo "Frontend is up!"
              exit 0
            fi
            echo "  attempt $i/24..."
            sleep 5
          done
          echo "Frontend did not start in time"
          exit 1

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          NODE_ENV: test
          COUCHDB_URL: http://localhost:5984
          COUCHDB_USER: admin
          COUCHDB_PASSWORD: password

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 14